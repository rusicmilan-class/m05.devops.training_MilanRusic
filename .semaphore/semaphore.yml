version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type:
      '[object Object]': null
    os_image:
      '[object Object]': null
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: "\U0001F9EA Test"
    dependencies:
      - "\U0001F680 Deploy to Kubernetes"
    task:
      jobs:
        - name: "\U0001F7E2 Run Tests"
          commands:
            - echo "Checking out code..."
            - echo "Installing dependencies..."
            - echo "Running test suite..."
            - echo "Tests completed successfully!"
  - name: "\U0001F680 Deploy to Kubernetes"
    dependencies:
      - Build and push
    task:
      jobs:
        - name: "\U0001F4E6 Deploy to Production"
          commands:
            - checkout
            - cd 1-deployment
            - echo "$KUBECONFIG_BASE64" | base64 -d > kubeconfig
            - export KUBECONFIG=$PWD/kubeconfig
            - 'kubectl config use-context "${KUBE_CONTEXT:-$(kubectl config current-context)}"'
            - kubectl create namespace g1 || true
            - kubectl config set-context --current --namespace=g1
            - kubectl apply -f deployment.yml
            - kubectl apply -f service.yml
            - kubectl rollout status deployment/flask-app --timeout=180s
            - kubectl get pods
            - kubectl get svc flask-app
      secrets:
        - name: kubeconfig
  - name: Build and push
    dependencies: []
    task:
      secrets:
        - name: DOCKER_MILAN
      jobs:
        - name: 'Job #1'
          commands:
            - checkout
            - cd 1-deployment
            - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            - 'docker build -t "$DOCKERHUB_USERNAME/my-flask-image:latest" .'
            - 'docker push "$DOCKERHUB_USERNAME/my-flask-image:latest"'
