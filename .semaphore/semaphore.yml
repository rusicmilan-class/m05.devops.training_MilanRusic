version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: Verify Blue
    dependencies:
      - Deploy Blue
    task:
      jobs:
        - name: Check Blue Service
          commands:
            - checkout
            - kubectl config set-context --current --namespace=g1
            - kubectl get svc flask-app
      secrets:
        - name: kubeconfig
  - name: Deploy Blue
    dependencies:
      - Build and push
    task:
      jobs:
        - name: Apply Blue Manifests
          commands:
            - checkout
            - mkdir -p ~/.kube
            - 'wget https://gist.githubusercontent.com/TomFern/c6121c6d7fd72faeb5b7cf0ce5a0e002/raw/9e86a4ca3ac8c8df6aa34cc661f1410711aef8bd/config -O ~/.kube/config'
            - cd 2-blue-green-deployment
            - kubectl config set-context --current --namespace="g1"
            - kubectl apply -f deployment-blue.yml
            - kubectl apply -f service-blue.yml
            - kubectl rollout status deployment/flask-app-blue --timeout=180s
      secrets:
        - name: kubeconfig
  - name: Build and push
    dependencies: []
    task:
      secrets:
        - name: DOCKER_MILAN
      jobs:
        - name: 'Job #1'
          commands:
            - checkout
            - cd 2-blue-green-deployment
            - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            - 'docker build -t "$DOCKERHUB_USERNAME/my-flask-image:latest" .'
            - 'docker push "$DOCKERHUB_USERNAME/my-flask-image:latest"'
            - echo "Done"
promotions:
  - name: Deploy Green
    pipeline_file: semaphore-green.yml
