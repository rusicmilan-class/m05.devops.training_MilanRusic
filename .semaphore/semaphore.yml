version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: "\U0001F9EA Verify"
    dependencies:
      - "\U0001F680 Deploy to Kubernetes"
    task:
      jobs:
        - name: "\U0001F7E2 Run Tests"
          commands:
            - kubectl config set-context --current --namespace=g1
            - kubectl get svc flask-app
      secrets:
        - name: DOCKER_MILAN
        - name: kubeconfig
  - name: "\U0001F680 Deploy to Kubernetes"
    dependencies:
      - Build and push
    task:
      jobs:
        - name: "\U0001F4E6 Deploy to Production"
          commands:
            - checkout
            - mkdir -p ~/.kube
            - 'wget https://gist.githubusercontent.com/TomFern/c6121c6d7fd72faeb5b7cf0ce5a0e002/raw/9e86a4ca3ac8c8df6aa34cc661f1410711aef8bd/config -O ~/.kube/config'
            - cd 1-deployment
            - kubectl create namespace "g1" || true
            - kubectl config set-context --current --namespace="g1"
            - kubectl apply -f deployment.yml
            - kubectl apply -f service.yml
            - kubectl rollout status deployment/flask-app --timeout=180s
      secrets:
        - name: kubeconfig
  - name: Build and push
    dependencies: []
    task:
      secrets:
        - name: DOCKER_MILAN
      jobs:
        - name: 'Job #1'
          commands:
            - checkout
            - cd 1-deployment
            - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            - 'docker build -t "$DOCKER_USERNAME/my-flask-image:latest" .'
            - 'docker push "$DOCKER_USERNAME/my-flask-image:latest"'
            - echo "Done"
