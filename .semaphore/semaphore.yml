version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type:
      '[object Object]': null
    os_image:
      '[object Object]': null
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: "\U0001F9EA Test"
    dependencies: []
    task:
      jobs:
        - name: "\U0001F7E2 Run Tests"
          commands:
            - echo "Checking out code..."
            - echo "Installing dependencies..."
            - echo "Running test suite..."
            - echo "Tests completed successfully!"
  - name: "\U0001F680 Deploy"
    dependencies:
      - "\U0001F9EA Test"
    task:
      jobs:
        - name: "\U0001F4E6 Deploy to Production"
          commands:
            - echo "Building application..."
            - echo "Running security checks..."
            - echo "Deploying to production..."
            - echo "Deployment completed successfully!"
  - name: Build and push
    dependencies:
      - "\U0001F9EA Test"
    task:
      secrets:
        - name: DOCKER_MILAN
      jobs:
        - name: 'Job #1'
          commands:
            - checkout
            - cd 1-deployment
            - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            - 'docker build -t "$DOCKERHUB_USERNAME/my-flask-image:latest" .'
            - 'docker push "$DOCKERHUB_USERNAME/my-flask-image:latest"'
