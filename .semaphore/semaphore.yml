version: v1.0
name: "Canary CI Pipeline"
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
promotions:
  - name: Deploy Canary
    pipeline_file: semaphore-canary.yml
blocks:
  - name: Verify Stable
    dependencies:
      - Deploy Stable
    task:
      jobs:
        - name: Check Stable Service
          commands:
            - checkout
            - kubectl config set-context --current --namespace=g1
            - kubectl get svc flask-app
      secrets:
        - name: kubeconfig
  - name: Deploy Stable
    dependencies:
      - Build and push
    task:
      jobs:
        - name: Apply Stable Manifests
          commands:
            - checkout
            - mkdir -p ~/.kube
            - 'wget https://gist.githubusercontent.com/TomFern/c6121c6d7fd72faeb5b7cf0ce5a0e002/raw/9e86a4ca3ac8c8df6aa34cc661f1410711aef8bd/config -O ~/.kube/config'
            - cd 3-canary-deployment
            - kubectl config set-context --current --namespace="g1"
            - kubectl apply -f deployment-stable.yml
            - kubectl apply -f service.yml
            - kubectl rollout status deployment/flask-app-stable --timeout=180s
      secrets:
        - name: kubeconfig
  - name: Build and push
    dependencies: []
    task:
      secrets:
        - name: DOCKER_MILAN
      jobs:
        - name: Build and Publish Image
          commands:
            - checkout
            - cd 3-canary-deployment
            - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            - 'docker build -t "$DOCKERHUB_USERNAME/my-flask-image:latest" .'
            - 'docker push "$DOCKERHUB_USERNAME/my-flask-image:latest"'
            - echo "Done"
